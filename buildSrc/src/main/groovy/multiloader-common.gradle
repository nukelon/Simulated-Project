plugins {
    id 'java-library'
    id 'maven-publish'
}

base {
    archivesName = "${mod_id}-${project.name}-${minecraft_version}"
}

java {
    toolchain.languageVersion = JavaLanguageVersion.of(java_version)
    withSourcesJar()
}

repositories {
    mavenCentral()

    // https://docs.gradle.org/current/userguide/declaring_repositories.html#declaring_content_exclusively_found_in_one_repository
    exclusiveContent {
        forRepository {
            maven {
                name = 'Sponge'
                url = 'https://repo.spongepowered.org/repository/maven-public'
            }
        }
        filter { includeGroupAndSubgroups('org.spongepowered') }
    }

    exclusiveContent {
        forRepositories(
                maven {
                    name = 'ParchmentMC'
                    url = 'https://maven.parchmentmc.org/'
                },
                maven {
                    name = "NeoForge"
                    url = 'https://maven.neoforged.net/releases'
                }
        )
        filter { includeGroup('org.parchmentmc.data') }
    }
    maven {
        name = 'BlameJared'
        url = 'https://maven.blamejared.com'
    }
}

if (project.path.endsWith(":common")) {
    dependencies {
        compileOnly "net.neoforged:neoforge:$neoforge_version"
        compileOnly group: 'org.spongepowered', name: 'mixin', version: '0.8.5'

        compileOnly("dev.ryanhcode.sable-companion:sable-companion-common-${project.minecraft_version}:${project.sable_companion_version}")

        // fabric and neoforge both bundle mixinextras, so it is safe to use it in common
        compileOnly group: 'io.github.llamalad7', name: 'mixinextras-common', version: '0.4.1'
        annotationProcessor group: 'io.github.llamalad7', name: 'mixinextras-common', version: '0.3.5'

        // neoforge version for JEI compat
        compileOnly("mezz.jei:jei-${minecraft_version}-neoforge:${jei_version}")

        implementation ("dev.ryanhcode.sable:sable-neoforge-${minecraft_version}:${sable_version}") {
            exclude group: "foundry.veil"
        }

        compileOnly("com.simibubi.create:create-${minecraft_version}:${create_version}:slim") { transitive = false }
        compileOnly("net.createmod.ponder:ponder-neoforge:${ponder_version}+mc${minecraft_version}")
        compileOnly("dev.engine-room.flywheel:flywheel-neoforge-api-${minecraft_version}:${flywheel_version}")
        implementation("com.tterrag.registrate:Registrate:${registrate_version}")

        implementation("foundry.veil:veil-common-${minecraft_version}:${project.veil_version}") {
            exclude group: "maven.modrinth"
            exclude group: "com.tterrag.registrate"
        }

        // Mod compat
        compileOnly("cc.tweaked:cc-tweaked-$minecraft_version-common-api:$computercraft_tweaked_version")
        compileOnly("maven.modrinth:natures-compass:$minecraft_version-$natures_compass_version-neoforge")
        compileOnly("maven.modrinth:sodium:$sodium_version")
        compileOnly("maven.modrinth:iris:$iris_version")
    }
}

['apiElements', 'runtimeElements', 'sourcesElements'].each { variant ->
    configurations."$variant".outgoing {
        capability("$group:${base.archivesName.get()}:$version")
        capability("$group:$mod_id-${project.name}-${minecraft_version}:$version")
        capability("$group:$mod_id:$version")
    }
    publishing.publications.configureEach {
        suppressPomMetadataWarningsFor(variant)
    }
}

sourcesJar {
    from(rootProject.file('LICENSE.md'))
}

jar {
    from(rootProject.file('LICENSE.md'))

    manifest {
        attributes([
                'Specification-Title'   : mod_name,
                'Specification-Vendor'  : mod_author,
                'Specification-Version' : project.jar.archiveVersion,
                'Implementation-Title'  : project.name,
                'Implementation-Version': project.jar.archiveVersion,
                'Implementation-Vendor' : mod_author,
                'Built-On-Minecraft'    : minecraft_version
        ])
    }
}

processResources {
    var expandProps = [
            'version'                      : version,
            'group'                        : project.group, //Else we target the task's group.
            'minecraft_version'            : minecraft_version,
            'minecraft_version_range'      : minecraft_version_range,
            'fabric_version'               : fabric_version,
            'fabric_loader_version'        : fabric_loader_version,
            'mod_name'                     : mod_name,
            'mod_author'                   : mod_author,
            'mod_id'                       : mod_id,
            'license'                      : license,
            'description'                  : project.description,
            'neoforge_version'             : neoforge_version,
            'neoforge_loader_version_range': neoforge_loader_version_range,
            'sable_mod_version'            : sable_mod_version,
            'create_mod_version'           : create_mod_version,
            'flywheel_mod_version'         : flywheel_mod_version,
            'credits'                      : credits,
            'java_version'                 : java_version
    ]

    filesMatching(['pack.mcmeta', 'fabric.mod.json', 'META-INF/mods.toml', 'META-INF/neoforge.mods.toml', '*.mixins.json']) {
        expand expandProps
    }
    inputs.properties(expandProps)
}

publishing {
    publications {
        register('mavenJava', MavenPublication) {
            artifactId base.archivesName.get()
            from components.java
        }
    }
    repositories {
        maven {
            url = System.getenv('local_maven_url')

            credentials {
                username = System.getenv('local_maven_user')
                password = System.getenv('local_maven_token')
            }

            authentication {
                basic(BasicAuthentication)
            }
        }
    }
}
